<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
<script>
/* global nn */ 

  function draw () {
    // let x = nn.random(700)
    // let y = nn.random(650)
    if (!nn.mouseDown) return
    let x = nn.mouseX
    let y = nn.mouseY
    let z = nn.random(1,5)
    let hue = nn.random(360)
    nn.create('a-box')
      .content('😀')
      .position(x,y)
      .scale(z)
      .hueRotate(hue)
      .rotate(nn.random(360))
      .addTo('body')
  }
  // for (let i = 0; i < 400; i++) {
  //   draw()
  //   i += 1
  // }
  nn.on('mousemove',draw)
